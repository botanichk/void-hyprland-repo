name: Build Hyprland for Void Linux

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    name: Build Hyprland x86_64
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:20250227R1
      options: --platform linux/amd64 --privileged

    steps:
      - name: Prepare container
        run: |
          # 1. Инициализация репозиториев (копируем конфиги)
          mkdir -p /etc/xbps.d
          cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          
          # 2. Синхронизируем списки пакетов (ждем сеть)
          xbps-install -S
          
          # 3. Обновляем сам менеджер пакетов
          xbps-install -y -u xbps
          
          # 4. Устанавливаем инструменты для сборки
          xbps-install -y git curl jq gnupg sudo bash grep gcc-libs

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Get latest Hyprland version
        id: upstream
        run: |
          VER=$(curl -s https://api.github.com/repos/hyprwm/Hyprland/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Update template
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          URL="https://github.com/hyprwm/Hyprland/archive/refs/tags/v${VER}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          sed -i "s/^version=.*/version=${VER}/" srcpkgs/hyprland/template
          sed -i "s/^checksum=.*/checksum=${SHA}/" srcpkgs/hyprland/template

      - name: Clone void-packages
        run: git clone --depth=1 https://github.com/void-linux/void-packages /void-packages

      - name: Copy our templates
        run: cp -r srcpkgs/* /void-packages/srcpkgs/

      - name: Bootstrap
        run: cd /void-packages && ./xbps-src binary-bootstrap

      - name: Build hyprland
        run: cd /void-packages && ./xbps-src pkg hyprland

      - name: Prepare repo
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          mkdir -p x86_64
          cp /void-packages/hostdir/binpkgs/hyprland-${VER}*.xbps x86_64/ || true
          xbps-rindex -a x86_64/*.xbps

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add x86_64/
          git commit -m "hyprland ${{ steps.upstream.outputs.version }}" || true
          git push
